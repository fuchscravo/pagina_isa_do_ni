<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora do amor</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header><h1>Será que a Isa ama o Ni o suficiente?</h1></header>
    <main>
      <p>
        Descubra o resultado da calculadora do amor, que mede o quanto a Isa ama
        o Ni!
      </p>
      <label for="Intensidade">Intensidade do amor:</label>
      <input type="range" id="Intensidade" min="0" max="100" />
      <button onclick="atualizarResultado()">Calcular amor</button>
    </main>
